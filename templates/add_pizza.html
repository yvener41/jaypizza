{% extends "base.html" %}

{% block title %}Add Pizza — Jay Pizza{% endblock %}
{% block topbar_title %}Add Pizza{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Add Pizza</h1>
        <p class="page-subtitle">Add a new pizza to the menu.</p>
    </div>
</div>

<div class="form-card">
<form method="POST" action="{{ url_for('add_pizza') }}">
    <div class="form-group">
        <label for="name">Pizza Name *</label>
        <input type="text" id="name" name="name" required placeholder="e.g., Margherita">
    </div>

    <div class="form-group">
        <label for="size">Size *</label>
        <select id="size" name="size" required>
            <option value="">Select size</option>
            <option value="Small">Small</option>
            <option value="Medium">Medium</option>
            <option value="Large">Large</option>
            <option value="Extra Large">Extra Large</option>
        </select>
    </div>

    <div class="form-group">
        <label for="base_price">Base Price ($) *</label>
        <input type="number" id="base_price" name="base_price" step="0.01" min="0" required placeholder="12.99">
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Describe your delicious pizza..."></textarea>
    </div>

    {% if toppings %}
    <div class="form-group">
        <label>Toppings (Optional)</label>
        <div class="checkbox-group">
            {% for topping in toppings %}
            <div class="checkbox-item">
                <input type="checkbox" id="topping_{{ topping.id }}" name="toppings" value="{{ topping.id }}">
                <label for="topping_{{ topping.id }}">{{ topping.name }} (+${{ "%.2f"|format(topping.price) }})</label>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button type="submit" class="btn">Add Pizza</button>
        <a href="{{ url_for('pizzas') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
</div>
{% endblock %}
