{% extends "base.html" %}

{% block title %}Add Customer — Jay Pizza{% endblock %}
{% block topbar_title %}Add Customer{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Add Customer</h1>
        <p class="page-subtitle">Register a new customer.</p>
    </div>
</div>

<div class="form-card">
<form method="POST" action="{{ url_for('add_customer') }}">
    <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="555-0123">
    </div>

    <div class="form-group">
        <label for="address">Delivery Address</label>
        <textarea id="address" name="address" placeholder="123 Main St, City, State"></textarea>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button type="submit" class="btn">Add Customer</button>
        <a href="{{ url_for('customers') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
</div>
{% endblock %}
